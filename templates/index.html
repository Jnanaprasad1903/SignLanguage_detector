<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path></svg>
                ASL Translator
            </div>
            <button id="clear-btn" class="clear-btn">Clear Text</button>
        </header>

        <main>
            <div class="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Webcam Feed" id="video-feed">
                
                <!-- Overlay for live prediction -->
                <div class="live-prediction-overlay">
                    <span id="current-word">Waiting...</span>
                    <span id="confidence" class="confidence-badge">0%</span>
                </div>
            </div>

            <div class="translation-panel">
                <h2>Translated Sentence</h2>
                <div class="sentence-box">
                    <p id="sentence">No signs detected yet.</p>
                </div>
                
                <div class="controls">
                    <div class="toggle-container">
                        <label class="switch">
                            <input type="checkbox" id="tts-toggle" checked>
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label">Text-to-Speech (Auto Read)</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
